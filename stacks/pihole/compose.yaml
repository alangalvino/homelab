services:
  pihole:
    container_name: pihole
    image: pihole/pihole:2025.07.1
    restart: unless-stopped
    environment:
      TZ: America/Recife
      FTLCONF_webserver_port: "80"
      VIRTUAL_HOST: pi.hole
      FTLCONF_misc_etc_dnsmasq_d: "true"
      FTLCONF_webserver_api_password: admin
      FTLCONF_dns_listeningMode: all
      FTLCONF_dns_upstreams: 1.1.1.1;9.9.9.9
      FTLCONF_dns_dnssec: "true"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    volumes:
      - /srv/pihole/etc-pihole:/etc/pihole
      - /srv/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
      - ./config/02-custom.conf:/etc/dnsmasq.d/02-custom.conf:ro
      - ./config/addn-hosts:/etc/addn-hosts:ro
      - ./config/adlists.list:/etc/pihole/adlists.list:ro
